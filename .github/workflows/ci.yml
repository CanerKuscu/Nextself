name: NextSelf CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test_and_lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm install
        
    - name: Check TypeScript Types
      run: npm run type-check
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Unit Tests
      run: npm test -- --passWithNoTests

  # Optional EAS Build verification pipeline can be added below for release branches.
