name: Detox E2E (Android)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-android:
    name: E2E (Android Emulator)
    runs-on: macos-13
    timeout-minutes: 60
    env:
      ADB_INSTALL_TIMEOUT: 20M
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Setup Android emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2
        env:
          ADB_INSTALL_TIMEOUT: 30M
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -noaudio -no-boot-anim -gpu swiftshader_indirect
          avd-name: Pixel_3a_API_30_x86
          script: |
            if [ -f "e2e/apks/app-debug.apk" ] && [ -f "e2e/apks/app-debug-androidTest.apk" ]; then
              echo "prebuilts found"
              adb devices
              adb install -r e2e/apks/app-debug.apk
              adb install -r e2e/apks/app-debug-androidTest.apk
            else
              echo "building apks"
              chmod +x android/gradlew
              npx detox build -c android.emu.debug
            fi
            npx detox test -c android.emu.debug --headless
