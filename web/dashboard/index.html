<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%234F46E5'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Arial,sans-serif' font-weight='bold' font-size='36'%3EB%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="NextSelf Professional Dashboard - Fitness & Wellness Management" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NextSelf Professional Dashboard" />
    <meta property="og:description" content="Professional dashboard for Fitness & Wellness App management" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="NextSelf Professional Dashboard" />
    <meta property="twitter:description" content="Professional dashboard for Fitness & Wellness App management" />

    <link rel="manifest" href="/manifest.json" />

    <title>NextSelf Professional Dashboard</title>

    <!-- Preconnect to fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
                 script-src 'self' 'unsafe-inline' 'unsafe-eval';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com data:;
                 img-src 'self' data: https:;
                 connect-src 'self' https://*.supabase.co https://*.googleapis.com ws://localhost:* wss://localhost:*;
                 frame-src 'none';
                 object-src 'none';
                 base-uri 'self';
                 form-action 'self';
                 upgrade-insecure-requests;">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
</head>

<body>
    <noscript>
        <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f8f9fa; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; z-index: 9999;">
            <div style="max-width: 600px;">
                <h1 style="color: #1a202c; margin-bottom: 20px;">JavaScript Required</h1>
                <p style="color: #4a5568; margin-bottom: 30px; line-height: 1.6;">
                    The NextSelf Professional Dashboard requires JavaScript to function properly.
                    Please enable JavaScript in your browser settings to continue.
                </p>
                <div style="background: #e2e8f0; border-radius: 8px; padding: 20px; margin-top: 30px; text-align: left;">
                    <h3 style="color: #2d3748; margin-bottom: 10px;">How to enable JavaScript:</h3>
                    <ul style="color: #4a5568; margin: 0; padding-left: 20px;">
                        <li>Chrome: Settings → Privacy and Security → Site Settings → JavaScript</li>
                        <li>Firefox: Options → Privacy & Security → Permissions → Enable JavaScript</li>
                        <li>Safari: Preferences → Security → Enable JavaScript</li>
                        <li>Edge: Settings → Cookies and site permissions → JavaScript</li>
                    </ul>
                </div>
            </div>
        </div>
    </noscript>

    <div id="root"></div>

    <div id="loading-fallback" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f8f9fa; display: flex; align-items: center; justify-content: center; z-index: 9998;">
        <div style="text-align: center;">
            <div style="width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top: 4px solid #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
            <p style="color: #4a5568; font-size: 16px;">Loading dashboard...</p>
        </div>
    </div>

    <!-- Injecting Vite script logic here -->
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
